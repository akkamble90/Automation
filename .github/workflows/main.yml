name: Security Automation Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # <--- THIS LINE IS CRITICAL FOR THE MANUAL RUN BUTTON

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Security Tests
      # We ignore the exit code so the report still uploads even if tests "fail" (find vulnerabilities)
      run: |
        python -m pytest security_automation --html=reports/report.html --self-contained-html
      continue-on-error: true

    - name: Upload Security Report
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-report
        path: reports/
