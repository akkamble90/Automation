name: Security Automation Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Dependencies
      run: |
        # Using the specific path since your files are inside a subfolder
        pip install -r security_automation/requirements.txt

    - name: Run Security Tests
      run: |
        # Run from the root but target the folder
        python -m pytest security_automation --html=security_automation/reports/report.html --self-contained-html
      continue-on-error: true

    - name: Upload Security Report
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-report
        path: security_automation/reports/
